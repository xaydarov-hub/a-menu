[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirects - SPA uchun muhim!
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Assets - cache boshqaruvi
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML - cache yo'q
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service Worker (agar ishlatsangiz)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Xavfsizlik headerlari
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"